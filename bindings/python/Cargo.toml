[package]
name = "safetensors-python"
version = "0.7.0-dev.0"
edition = "2021"
rust-version = "1.80"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "safetensors_rust"
crate-type = ["cdylib"]

[features]
default = ["io_uring"]
# io_uring support for async I/O (Linux only)
io_uring = ["safetensors/io_uring"]

[dependencies]
dlpark = "0.6.0"
pyo3 = { version = "0.26", features = ["abi3", "abi3-py310"] }
serde_json = "1.0"

[dependencies.safetensors]
path = "../../safetensors"
# std is default (includes hmll loader), cuda adds GPU support
features = ["cuda"]
